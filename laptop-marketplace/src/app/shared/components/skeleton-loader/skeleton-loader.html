@if (type() === 'card') {
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    @for (i of [].constructor(count()); track $index) {
      <div class="card overflow-hidden animate-pulse">
        <div class="aspect-[4/3] bg-surface dark:bg-slate-700"></div>
        <div class="p-5 space-y-3">
          <div class="h-4 bg-surface dark:bg-slate-700 rounded w-1/3"></div>
          <div class="h-5 bg-surface dark:bg-slate-700 rounded w-2/3"></div>
          <div class="h-3 bg-surface dark:bg-slate-700 rounded w-full"></div>
          <div class="h-3 bg-surface dark:bg-slate-700 rounded w-4/5"></div>
          <div class="h-8 bg-surface dark:bg-slate-700 rounded w-1/2"></div>
        </div>
      </div>
    }
  </div>
} @else {
  <div class="space-y-4">
    @for (i of [].constructor(count()); track $index) {
      <div class="h-16 bg-surface dark:bg-slate-700 rounded-xl animate-pulse"></div>
    }
  </div>
}
