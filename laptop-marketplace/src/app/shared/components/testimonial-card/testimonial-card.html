<article class="testimonial-card card-hover h-full flex flex-col p-6 md:p-7">
  <div class="flex items-center gap-4 mb-5">
    @if (review().customerImage) {
      <img
        [src]="review().customerImage"
        [alt]="review().customerName"
        class="w-14 h-14 rounded-full object-cover ring-2 ring-primary/20"
        loading="lazy"
      />
    } @else {
      <div class="w-14 h-14 rounded-full bg-primary/10 flex items-center justify-center ring-2 ring-primary/20">
        <span class="text-primary font-bold text-lg">{{ initials }}</span>
      </div>
    }
    <div class="min-w-0">
      <h3 class="font-bold text-text-primary dark:text-white truncate">{{ review().customerName }}</h3>
      @if (subtitle) {
        <p class="text-sm text-text-secondary truncate">{{ subtitle }}</p>
      }
    </div>
  </div>

  <app-star-rating [rating]="review().rating" size="md" class="mb-4 block" />

  <blockquote class="text-sm md:text-base text-text-secondary leading-relaxed flex-1">
    "{{ review().reviewText }}"
  </blockquote>
</article>
