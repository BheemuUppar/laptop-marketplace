<div class="card p-6 h-full flex flex-col">
  <div class="flex items-start justify-between mb-4 gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
        <span class="text-primary font-bold text-sm">{{ review().customerName.charAt(0) }}</span>
      </div>
      <div class="min-w-0">
        <h4 class="font-semibold text-text-primary dark:text-white truncate">{{ review().customerName }}</h4>
        <p class="text-xs text-text-secondary">{{ review().createdAt | date:'mediumDate' }}</p>
      </div>
    </div>
    <app-star-rating [rating]="review().rating" />
  </div>

  <p class="text-sm text-text-secondary leading-relaxed flex-1 mb-4">"{{ review().reviewText }}"</p>

  @if (review().customerRole) {
    <p class="text-xs text-primary font-medium mt-auto">{{ review().customerRole }}</p>
  }
</div>
